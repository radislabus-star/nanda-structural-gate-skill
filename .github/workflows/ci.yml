name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check --manifest-path Cargo.toml

      - name: Run local tests
        run: scripts/test-local.sh

      - name: Run edge-case tests
        run: scripts/test-edge-cases.sh

      - name: Run benchmark smoke
        run: scripts/benchmark-v0.sh

      - name: Release doctor
        run: cargo run --quiet --manifest-path Cargo.toml -- doctor

      - name: Eval corpus
        run: cargo run --quiet --manifest-path Cargo.toml -- eval --suite examples/eval-corpus.json

      - name: WAW corpus
        run: cargo run --quiet --manifest-path Cargo.toml -- waw --suite examples/waw-corpus.json

      - name: Dataset doctor
        run: cargo run --quiet --manifest-path Cargo.toml -- dataset-doctor examples/triad-packet.dataset-noise.json --input-format json --route-cap 8 || test "$?" -eq 3

      - name: Serve smoke
        run: printf '{"command":"doctor"}\n' | cargo run --quiet --manifest-path Cargo.toml -- serve

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check --manifest-path Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path Cargo.toml

      - name: Release doctor
        run: cargo run --quiet --manifest-path Cargo.toml -- doctor

      - name: Eval route-trap examples
        run: cargo run --quiet --manifest-path Cargo.toml -- eval --case examples/triad-packet.interference-search-route-trap.json:certification:FOCUSED --case examples/triad-packet.interference-search-noisy.json:certification:WATCH

      - name: Eval corpus
        run: cargo run --quiet --manifest-path Cargo.toml -- eval --suite examples/eval-corpus.json

      - name: WAW corpus
        run: cargo run --quiet --manifest-path Cargo.toml -- waw --suite examples/waw-corpus.json

      - name: Dataset doctor
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          cargo run --quiet --manifest-path Cargo.toml -- dataset-doctor examples/triad-packet.dataset-noise.json --input-format json --route-cap 8
          $code = $LASTEXITCODE
          if ($code -ne 3) { exit $code }
          exit 0

      - name: Serve smoke
        shell: pwsh
        run: |
          '{"command":"doctor"}' | cargo run --quiet --manifest-path Cargo.toml -- serve

      - name: Install Windows wrappers
        shell: pwsh
        run: |
          ./scripts/install-windows.ps1
          & "$env:USERPROFILE\.local\bin\nanda-doctor.cmd"
